<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stats — IPL Match Predictor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

  <nav class="navbar">
    <div class="nav-left">
      <div class="brand">
        <span class="brand-mark">IPL</span>
        MATCH PREDICTOR
      </div>
      <div class="nav-links">
        <a href="/" class="nav-link">Home</a>
        <a href="/stats" class="nav-link active">Stats</a>
        <a href="/teams" class="nav-link">Teams</a>
      </div>
    </div>
    <div class="nav-right">
      <div class="icon-btn">&#9679;</div>
      <div class="icon-btn">&#9787;</div>
    </div>
  </nav>

  <main class="page">
    <p class="page-eyebrow">PLAYER STATS</p>
    <h1 class="page-title">Squad <span class="accent">Stat Sheet</span></h1>
    <p class="page-subhead">Select a team to see every player's batting and bowling numbers side by side.</p>

    <div class="stats-controls">
      <div class="stats-select-wrap">
        <select id="team-select" class="team-select"></select>
      </div>
    </div>

    <div class="stats-table-wrap">
      <table class="stats-table">
        <thead>
          <tr>
            <th>Player</th>
            <th>Bat Avg</th>
            <th>Strike Rate</th>
            <th>Bowl Avg</th>
            <th>Economy</th>
          </tr>
        </thead>
        <tbody id="stats-table-body">
          <tr class="loading-row"><td colspan="5">Pick a team above to load its stats</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <script src="{{ url_for('static', filename='stats.js') }}"></script>
</body>
</html>
